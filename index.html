<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキスト比較ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            padding-right: 50px; /* バーのための余白 */
            background-color: #ffffff;
            color: #333;
        }
        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 5px;
        }
        .flex-container {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-bottom: 15px;
        }
        .pane {
            flex: 1;
            width: 50%;
            display: flex;
            flex-direction: column;
        }
        .pane-header {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-bottom: none;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            resize: vertical;
            font-family: monospace;
        }
        .controls {
            text-align: center;
            background-color: #f0f0f0;
            padding: 15px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .controls label {
            margin: 0 10px;
            font-size: 15px;
            cursor: pointer;
        }
        button {
            margin-left: 20px;
            padding: 8px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .char-count {
            font-size: 12px;
            color: #888;
            font-weight: normal;
        }
        
        /* ミニマップ（復活） */
        .minimap {
            position: fixed;
            top: 0;
            right: 0;
            width: 40px;
            height: 100vh;
            background-color: rgba(240, 240, 240, 0.7);
            border-left: 1px solid #ccc;
            z-index: 1000;
            cursor: pointer;
            box-shadow: -2px 0 5px rgba(0,0,0,0.05);
        }
        .minimap-marker {
            position: absolute;
            left: 0;
            width: 100%;
            min-height: 3px;
            opacity: 0.8;
            pointer-events: none; /* クリックは背景のminimapで拾う */
        }
        .minimap-marker.del-marker {
            background-color: #4da6ff;
        }
        .minimap-marker.ins-marker {
            background-color: #33cc33;
        }

        /* 差分ハイライト */
        .del {
            background-color: #cceeff;
            text-decoration: line-through;
        }
        .ins {
            background-color: #ccffcc;
            font-weight: bold;
        }

        /* 結果表示エリア */
        .result-pane {
            flex: 1;
            border: 1px solid #bbb;
            min-height: 250px;
            background-color: #fafafa;
            overflow-x: auto;
            tab-size: 4;
        }
        .diff-row {
            display: flex;
            width: 100%;
            border-bottom: 1px dashed #ddd;
        }
        .diff-row:last-child {
            border-bottom: none;
        }
        .diff-cell {
            flex: 1;
            width: 50%;
            padding: 2px 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-sizing: border-box;
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        .diff-cell.left-cell {
            border-right: 1px solid #bbb;
        }
        
        /* 上に戻るボタン（復活） */
        #back-to-top {
            position: fixed;
            bottom: 30px;
            right: 60px;
            width: 80px;
            height: 80px;
            background-color: #9fd9ff;
            color: rgb(0, 0, 0);
            border: none;
            border-radius: 30%;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            transition: background-color 0.2s, opacity 0.3s;
            padding: 0;
            margin: 0;
            opacity: 0.8;
        }
        #back-to-top:hover {
            background-color: #2980b9;
            opacity: 1;
        }

        .diff-row:hover {
            background-color: #f6f8fa;
        }
        .diff-row.active-row {
            background-color: #fff8c5 !important;
            outline: 1px solid #e1d387;
            z-index: 1;
            position: relative;
        }

        /* 類似度表示エリア */
        .similarity-wrapper {
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px 30px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .similarity-title {
            font-size: 18px;
            font-weight: bold;
        }
        .similarity-bar-container {
            flex: 1;
            height: 20px;
            background-color: #e9ecef;
            border-radius: 10px;
            margin: 0 20px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
        }
        .similarity-bar {
            height: 100%;
            background-color: #28a745;
            width: 0%;
            transition: width 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), background-color 0.5s ease;
        }
        .similarity-score-box {
            text-align: right;
            min-width: 140px;
        }
        .similarity-score {
            font-size: 26px;
            font-weight: bold;
            color: #28a745;
        }
        .similarity-status {
            font-size: 12px;
            font-weight: bold;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="pane">
            <div class="pane-header">
                <span>元のテキスト (変更前)</span>
                <span id="old-count" class="char-count"></span>
            </div>
            <textarea id="text-old" placeholder="ここに元のテキストを入力..."></textarea>
        </div>
        <div class="pane">
            <div class="pane-header">
                <span>新しいテキスト (変更後)</span>
                <span id="new-count" class="char-count"></span>
            </div>
            <textarea id="text-new" placeholder="ここに新しいテキストを入力..."></textarea>
        </div>
    </div>

    <div class="controls">
        <b>比較モード:</b>
        <label><input type="radio" name="mode" value="char"> 文字単位</label>
        <label><input type="radio" name="mode" value="word" checked> 単語単位</label>
        <label><input type="radio" name="mode" value="line"> 行単位</label>
        <label><input type="radio" name="mode" value="academic"> シミラリティチェッカー</label>
        <button onclick="swapTexts()">左右を入れ替える</button>
        <button onclick="compareText()">比較する</button>
    </div>

    <div id="similarity-container" style="display: none;">
        <div class="similarity-wrapper">
            <div class="similarity-title">テキスト類似度</div>
            <div class="similarity-bar-container">
                <div id="similarity-bar" class="similarity-bar"></div>
            </div>
            <div class="similarity-score-box">
                <div id="similarity-score" class="similarity-score">0.0%</div>
                <div id="similarity-status" class="similarity-status"></div>
            </div>
        </div>
    </div>

    <div id="result-container" style="display: none; flex-direction: column; margin-bottom: 20px;">
        <div class="flex-container" style="margin-bottom: 0;">
            <div class="pane" style="border: none; background: transparent; padding-bottom: 0;">
                <div class="pane-header">変更前（削除された部分）</div>
            </div>
            <div class="pane" style="border: none; background: transparent; padding-bottom: 0;">
                <div class="pane-header">変更後（追加された部分）</div>
            </div>
        </div>
        <div id="unified-result" class="result-pane" style="display: flex; flex-direction: column; padding: 0;">
        </div>
    </div>

    <div id="minimap" class="minimap" style="display: none;"></div>
    <button id="back-to-top" onclick="scrollToTop()" title="ページ上部へ戻る">↑</button>

    <script>
        let diffWorker = null;

        function compareText() {
            const textOld = document.getElementById('text-old').value.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const textNew = document.getElementById('text-new').value.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const mode = document.querySelector('input[name="mode"]:checked').value;

            document.getElementById('old-count').innerText = `${textOld.length}文字`;
            document.getElementById('new-count').innerText = `${textNew.length}文字`;

            const resultContainer = document.getElementById('unified-result');
            const resultWrapper = document.getElementById('result-container');
            const similarityContainer = document.getElementById('similarity-container');
            const minimap = document.getElementById('minimap');

            if (mode === 'academic') {
                similarityContainer.style.display = 'block';
            } else {
                similarityContainer.style.display = 'none';
            }

            resultContainer.innerHTML = `
                <div style="padding: 50px; text-align: center; width: 100%; color: #555; font-family: sans-serif;">
                    <strong>差分を計算中...</strong>
                </div>
            `;
            resultWrapper.style.display = 'flex';
            minimap.style.display = 'none';

            if (diffWorker) diffWorker.terminate();

            const workerCode = `
                importScripts('https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js');

                self.onmessage = function(e) {
                    const textOld = e.data.textOld;
                    const textNew = e.data.textNew;
                    const mode = e.data.mode;

                    let diffResult;
                    let similarity = 0;

                    if (mode === 'academic') {
                        const n = 10;
                        const strOld = textOld.replace(/[\\s\\r\\n　]+/g, '');
                        const strNew = textNew.replace(/[\\s\\r\\n　]+/g, '');

                        const getNGrams = (str, n) => {
                            const ngrams = new Set();
                            for (let i = 0; i <= str.length - n; i++) {
                                ngrams.add(str.substring(i, i + n));
                            }
                            return ngrams;
                        };

                        if (strOld.length < n || strNew.length < n) {
                            similarity = (strOld === strNew && strOld !== '') ? 100 : 0;
                        } else {
                            const setA = getNGrams(strOld, n);
                            const setB = getNGrams(strNew, n);
                            let intersection = 0;
                            for (let gram of setA) {
                                if (setB.has(gram)) intersection++;
                            }
                            const union = setA.size + setB.size - intersection;
                            similarity = union === 0 ? 0 : (intersection / union) * 100;
                        }
                        diffResult = Diff.diffChars(textOld, textNew);
                    } else {
                        if (mode === 'line') diffResult = Diff.diffLines(textOld, textNew);
                        else if (mode === 'word') diffResult = Diff.diffWords(textOld, textNew);
                        else diffResult = Diff.diffChars(textOld, textNew);
                    }

                    const escapeMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
                    const escapeHtml = (str) => str.replace(/[&<>'"]/g, match => escapeMap[match] || match);

                    let leftRows = [], rightRows = [];
                    let currentLeft = '', currentRight = '';

                    diffResult.forEach(part => {
                        const lines = part.value.split('\\n');
                        
                        if (!part.added && !part.removed) {
                            const maxTotal = Math.max(leftRows.length, rightRows.length);
                            while (leftRows.length < maxTotal) leftRows.push('');
                            while (rightRows.length < maxTotal) rightRows.push('');
                        }

                        for (let i = 0; i < lines.length; i++) {
                            const isLastLine = (i === lines.length - 1);
                            const text = lines[i] ? escapeHtml(lines[i]) : '';
                            
                            if (part.added) {
                                if (text) currentRight += '<span class="ins">' + text + '</span>';
                                if (!isLastLine) {
                                    rightRows.push(currentRight);
                                    currentRight = '';
                                }
                            } else if (part.removed) {
                                if (text) currentLeft += '<span class="del">' + text + '</span>';
                                if (!isLastLine) {
                                    leftRows.push(currentLeft);
                                    currentLeft = '';
                                }
                            } else {
                                if (text) {
                                    currentLeft += text;
                                    currentRight += text;
                                }
                                if (!isLastLine) {
                                    leftRows.push(currentLeft);
                                    rightRows.push(currentRight);
                                    currentLeft = '';
                                    currentRight = '';
                                }
                            }
                        }
                    });

                    if (currentLeft !== '' || currentRight !== '') {
                        leftRows.push(currentLeft);
                        rightRows.push(currentRight);
                    }

                    const finalMax = Math.max(leftRows.length, rightRows.length);
                    while (leftRows.length < finalMax) leftRows.push('');
                    while (rightRows.length < finalMax) rightRows.push('');

                    const htmlChunks = [];
                    for (let i = 0; i < leftRows.length; i++) {
                        const l = leftRows[i] === '' ? '<span style="visibility:hidden;">&nbsp;</span>' : leftRows[i];
                        const r = rightRows[i] === '' ? '<span style="visibility:hidden;">&nbsp;</span>' : rightRows[i];
                        htmlChunks.push(
                            '<div class="diff-row">' +
                                '<div class="diff-cell left-cell">' + l + '</div>' +
                                '<div class="diff-cell right-cell">' + r + '</div>' +
                            '</div>'
                        );
                    }

                    self.postMessage({ html: htmlChunks.join(''), similarity: similarity });
                };
            `;

            const blob = new Blob([workerCode], { type: 'application/javascript' });
            diffWorker = new Worker(URL.createObjectURL(blob));

            diffWorker.onmessage = function(e) {
                const finalHtml = e.data.html;
                const similarity = parseFloat(e.data.similarity);
                
                if (mode === 'academic') {
                    const scoreEl = document.getElementById('similarity-score');
                    const barEl = document.getElementById('similarity-bar');
                    const statusEl = document.getElementById('similarity-status');
                    const simVal = similarity.toFixed(1);
                    scoreEl.innerText = `${simVal}%`;
                    barEl.style.width = `${simVal}%`;
                    let color = '#28a745'; let status = '安全';
                    if (similarity >= 75) { color = '#dc3545'; status = '極めて高い類似性'; }
                    else if (similarity >= 50) { color = '#fd7e14'; status = '高い類似性'; }
                    else if (similarity >= 25) { color = '#ffc107'; status = '要注意'; }
                    else if (similarity >= 15) { color = '#17a2b8'; status = '許容範囲内'; }
                    scoreEl.style.color = color; barEl.style.backgroundColor = color;
                    statusEl.innerText = status; statusEl.style.color = color;
                }

                resultContainer.innerHTML = finalHtml;
                minimap.style.display = 'block';
                // レンダリング後にミニマップを描画
                setTimeout(drawMinimap, 200);
            };

            diffWorker.postMessage({ textOld, textNew, mode });
        }

        function drawMinimap() {
            const minimap = document.getElementById('minimap');
            minimap.innerHTML = '';
            const pageHeight = document.documentElement.scrollHeight;
            const viewHeight = window.innerHeight;

            const createMarkers = (selector, markerClass) => {
                document.querySelectorAll(selector).forEach(el => {
                    const rect = el.getBoundingClientRect();
                    const absoluteTop = rect.top + window.scrollY;
                    const topPercent = (absoluteTop / pageHeight) * 100;
                    const heightPercent = (rect.height / pageHeight) * 100;

                    const marker = document.createElement('div');
                    marker.className = `minimap-marker ${markerClass}`;
                    marker.style.top = `${topPercent}%`;
                    marker.style.height = `${Math.max(heightPercent, 0.2)}%`;
                    minimap.appendChild(marker);
                });
            };

            createMarkers('.left-cell .del', 'del-marker');
            createMarkers('.right-cell .ins', 'ins-marker');

            // ミニマップクリックでジャンプ
            minimap.onclick = (e) => {
                const clickY = e.clientY;
                const scrollTarget = (clickY / viewHeight) * pageHeight;
                window.scrollTo({
                    top: scrollTarget - (viewHeight / 2),
                    behavior: 'smooth'
                });
            };
        }

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('back-to-top');
            if (window.scrollY > 300) {
                btn.style.display = 'flex';
            } else {
                btn.style.display = 'none';
            }
        });

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function swapTexts() {
            const o = document.getElementById('text-old');
            const n = document.getElementById('text-new');
            const t = o.value; o.value = n.value; n.value = t;
            if (document.getElementById('result-container').style.display !== 'none') compareText();
        }

        window.addEventListener('resize', () => {
            if (document.getElementById('minimap').style.display !== 'none') drawMinimap();
        });

        document.addEventListener('DOMContentLoaded', () => {
            const unifiedResult = document.getElementById('unified-result');
            const highlightCorrespondingRow = (event) => {
                document.querySelectorAll('.diff-row.active-row').forEach(row => row.classList.remove('active-row'));
                const selection = window.getSelection();
                let targetNode = event.target;
                if (selection.toString().length > 0 && selection.anchorNode) {
                    targetNode = selection.anchorNode.nodeType === 3 ? selection.anchorNode.parentNode : selection.anchorNode;
                }
                const diffRow = targetNode.closest('.diff-row');
                if (diffRow) diffRow.classList.add('active-row');
            };
            unifiedResult.addEventListener('click', highlightCorrespondingRow);
            unifiedResult.addEventListener('mouseup', highlightCorrespondingRow);
        });
    </script>
</body>
</html>
