<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキスト比較ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            padding-right: 40px; 
            background-color: #ffffff;
            color: #333;
        }
        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 5px;
        }
        .flex-container {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-bottom: 15px;
        }
        .pane {
            flex: 1;
            width: 50%;
            display: flex;
            flex-direction: column;
        }
        .pane-header {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-bottom: none;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            resize: vertical;
            font-family: monospace;
        }
        .controls {
            text-align: center;
            background-color: #f0f0f0;
            padding: 15px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .controls label {
            margin: 0 10px;
            font-size: 15px;
            cursor: pointer;
        }
        button {
            margin-left: 20px;
            padding: 8px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .char-count {
            font-size: 12px;
            color: #888;
            font-weight: normal;
        }
        
        /* ミニマップ */
        .minimap {
            position: fixed;
            top: 0;
            right: 0;
            width: 40px;
            height: 100vh;
            background-color: rgba(240, 240, 240, 0.7);
            border-left: 1px solid #ccc;
            z-index: 1000;
            cursor: pointer;
            box-shadow: -2px 0 5px rgba(0,0,0,0.05);
        }
        .minimap-marker {
            position: absolute;
            left: 0;
            width: 100%;
            min-height: 3px;
            opacity: 0.8;
        }
        .minimap-marker:hover {
            opacity: 1;
        }
        .minimap-marker.del-marker {
            background-color: #4da6ff;
        }
        .minimap-marker.ins-marker {
            background-color: #33cc33;
        }

        /* 差分ハイライト */
        .del {
            background-color: #cceeff;
            text-decoration: line-through;
        }
        .ins {
            background-color: #ccffcc;
            font-weight: bold;
        }

        /* 新しい結果表示エリア（行同期対応） */
        .result-pane {
            flex: 1;
            border: 1px solid #bbb;
            min-height: 250px;
            background-color: #fafafa;
            overflow-x: auto;
            tab-size: 4;
        }
        .diff-row {
            display: flex;
            width: 100%;
            border-bottom: 1px dashed #ddd; /* 左右の高さを同期するための行区切り */
        }
        .diff-row:last-child {
            border-bottom: none;
        }
        .diff-cell {
            flex: 1;
            width: 50%;
            padding: 2px 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-sizing: border-box;
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        .diff-cell.left-cell {
            border-right: 1px solid #bbb;
        }
        .newline-symbol {
            color: #aaa;
            font-size: 0.9em;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="flex-container">
        <div class="pane">
            <div class="pane-header">
                <span>元のテキスト (変更前)</span>
                <span id="old-count" class="char-count"></span>
            </div>
            <textarea id="text-old" placeholder="ここに元のテキストを入力..."></textarea>
        </div>
        <div class="pane">
            <div class="pane-header">
                <span>新しいテキスト (変更後)</span>
                <span id="new-count" class="char-count"></span>
            </div>
            <textarea id="text-new" placeholder="ここに新しいテキストを入力..."></textarea>
        </div>
    </div>

    <div class="controls">
        <b>比較モード:</b>
        <label><input type="radio" name="mode" value="char" checked> 文字単位</label>
        <label><input type="radio" name="mode" value="word"> 単語単位</label>
        <label><input type="radio" name="mode" value="line"> 行単位</label>
        <button onclick="swapTexts()">左右を入れ替える</button>
        <button onclick="compareText()">比較する</button>
    </div>

    <div id="result-container" style="display: none; flex-direction: column; margin-bottom: 20px;">
        <div class="flex-container" style="margin-bottom: 0;">
            <div class="pane" style="border: none; background: transparent; padding-bottom: 0;">
                <div class="pane-header">変更前（削除された部分）</div>
            </div>
            <div class="pane" style="border: none; background: transparent; padding-bottom: 0;">
                <div class="pane-header">変更後（追加された部分）</div>
            </div>
        </div>
        <div id="unified-result" class="result-pane" style="display: flex; flex-direction: column; padding: 0;">
            </div>
    </div>

    <div id="minimap" class="minimap" style="display: none;"></div>

    <script>
        let diffWorker = null;

        function compareText() {
            const textOld = document.getElementById('text-old').value.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const textNew = document.getElementById('text-new').value.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const mode = document.querySelector('input[name="mode"]:checked').value;

            document.getElementById('old-count').innerText = `${textOld.length}文字`;
            document.getElementById('new-count').innerText = `${textNew.length}文字`;

            const resultContainer = document.getElementById('unified-result');
            const resultWrapper = document.getElementById('result-container');
            const minimap = document.getElementById('minimap');

            // 【追加】くるくる回るCSSアニメーションと待機画面
            resultContainer.innerHTML = `
                <style>
                    .spinner {
                        border: 4px solid #f3f3f3;
                        border-top: 4px solid #3498db;
                        border-radius: 50%;
                        width: 40px;
                        height: 40px;
                        animation: spin 1s linear infinite;
                        margin: 0 auto 15px auto;
                    }
                    @keyframes spin {
                        0% { transform: rotate(0deg); }
                        100% { transform: rotate(360deg); }
                    }
                </style>
                <div style="padding: 50px; text-align: center; width: 100%; color: #555; font-family: sans-serif;">
                    <div class="spinner"></div>
                    <strong>差分を計算・構築中...</strong>
                    <div style="margin-top:10px; font-size: 13px; color: #888;">
                        ブラウザはフリーズしていません。<br>文字数が多い場合、このまま数十秒お待ちください。
                    </div>
                </div>
            `;
            resultWrapper.style.display = 'flex';
            minimap.style.display = 'none';

            if (diffWorker) {
                diffWorker.terminate();
            }

            // Web Workerコード（トークン化もHTML構築もすべてここで実行）
            const workerCode = `
                importScripts('https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js');

                self.onmessage = function(e) {
                    const textOld = e.data.textOld;
                    const textNew = e.data.textNew;
                    const mode = e.data.mode;

                    // 1. 自作の遅いtokenizeを廃止し、jsdiffの標準メソッドを使用
                    let diffResult;
                    if (mode === 'line') {
                        diffResult = Diff.diffLines(textOld, textNew);
                    } else if (mode === 'word') {
                        diffResult = Diff.diffWords(textOld, textNew);
                    } else {
                        diffResult = Diff.diffChars(textOld, textNew);
                    }

                    // 2. エスケープ処理の高速化
                    const escapeMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
                    const escapeHtml = (str) => str.replace(/[&<>'"]/g, match => escapeMap[match] || match);

                    let leftRows = [];
                    let rightRows = [];
                    let currentLeft = [];
                    let currentRight = [];

                    // 3. 文字列連結(+=)を避け、配列(push)とjoinを使用
                    diffResult.forEach(part => {
                        // diffLines等の結果は文字列で返ってくるため、ここで改行ごとに分割
                        const subTokens = part.value.split(/(\\n)/);
                        
                        for (let i = 0; i < subTokens.length; i++) {
                            const subToken = subTokens[i];
                            if (subToken === '\\n') {
                                leftRows.push(currentLeft.join(''));
                                rightRows.push(currentRight.join(''));
                                currentLeft = [];
                                currentRight = [];
                            } else if (subToken !== '') {
                                const escaped = escapeHtml(subToken);
                                if (part.added) {
                                    currentRight.push('<span class="ins">' + escaped + '</span>');
                                } else if (part.removed) {
                                    currentLeft.push('<span class="del">' + escaped + '</span>');
                                } else {
                                    currentLeft.push(escaped);
                                    currentRight.push(escaped);
                                }
                            }
                        }
                    });

                    leftRows.push(currentLeft.join(''));
                    rightRows.push(currentRight.join(''));

                    // 行ごとのdivブロックを生成
                    const htmlChunks = [];
                    for (let i = 0; i < leftRows.length; i++) {
                        const l = leftRows[i] === '' ? '<span style="visibility:hidden;">&nbsp;</span>' : leftRows[i];
                        const r = rightRows[i] === '' ? '<span style="visibility:hidden;">&nbsp;</span>' : rightRows[i];
                        htmlChunks.push(
                            '<div class="diff-row">' +
                                '<div class="diff-cell left-cell">' + l + '</div>' +
                                '<div class="diff-cell right-cell">' + r + '</div>' +
                            '</div>'
                        );
                    }

                    // 完全に完成したHTML文字列だけをメインスレッドへ返す
                    self.postMessage(htmlChunks.join(''));
                };
            `;

            const blob = new Blob([workerCode], { type: 'application/javascript' });
            diffWorker = new Worker(URL.createObjectURL(blob));

            // メインスレッド（画面側）の受信処理
            diffWorker.onmessage = function(e) {
                const finalHtml = e.data;
                
                // 画面側は受け取ったHTML文字列を入れるだけ（負荷ゼロ）
                resultContainer.innerHTML = finalHtml;
                minimap.style.display = 'block';
                setTimeout(drawMinimap, 100);
            };

            // Workerにプレーンテキストだけを投げて処理開始
            diffWorker.postMessage({ textOld, textNew, mode });
        }

        function drawMinimap() {
            const minimap = document.getElementById('minimap');
            minimap.innerHTML = '';
            const pageHeight = document.documentElement.scrollHeight;
            
            const createMarkers = (selector, markerClass) => {
                document.querySelectorAll(selector).forEach(el => {
                    const rect = el.getBoundingClientRect();
                    const absoluteTop = rect.top + window.scrollY;
                    const topPercent = (absoluteTop / pageHeight) * 100;
                    const heightPercent = (rect.height / pageHeight) * 100;

                    const marker = document.createElement('div');
                    marker.className = `minimap-marker ${markerClass}`;
                    marker.style.top = `${topPercent}%`;
                    marker.style.height = `${Math.max(heightPercent, 0.2)}%`;

                    marker.onclick = (e) => {
                        e.stopPropagation();
                        window.scrollTo({ top: absoluteTop - 100, behavior: 'smooth' });
                    };
                    minimap.appendChild(marker);
                });
            };

            createMarkers('.left-cell .del', 'del-marker');
            createMarkers('.right-cell .ins', 'ins-marker');

            minimap.onclick = (e) => {
                const clickY = e.clientY;
                const windowHeight = window.innerHeight;
                const scrollTarget = (clickY / windowHeight) * pageHeight;
                window.scrollTo({
                    top: scrollTarget - (windowHeight / 2),
                    behavior: 'smooth'
                });
            };
        }

        window.addEventListener('resize', () => {
            if (document.getElementById('result-container').style.display !== 'none') {
                drawMinimap();
            }
        });

        function swapTexts() {
            const oldInput = document.getElementById('text-old');
            const newInput = document.getElementById('text-new');
            const temp = oldInput.value;
            oldInput.value = newInput.value;
            newInput.value = temp;
            if (document.getElementById('result-container').style.display !== 'none') {
                compareText();
            }
        }
    </script>
</body>
</html>
