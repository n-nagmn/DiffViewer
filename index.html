<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキスト比較ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            /* 右側にバーを表示するため、右の余白を少し広めに確保 */
            padding-right: 40px; 
            background-color: #ffffff;
            color: #333;
        }
        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        /* 左右分割レイアウト */
        .flex-container {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-bottom: 15px;
        }
        .pane {
            flex: 1;
            width: 50%;
            display: flex;
            flex-direction: column;
        }
        .pane-header {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-bottom: none;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            resize: vertical;
            font-family: monospace;
        }
        /* コントロールバー */
        .controls {
            text-align: center;
            background-color: #f0f0f0;
            padding: 15px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .controls label {
            margin: 0 10px;
            font-size: 15px;
            cursor: pointer;
        }
        button {
            margin-left: 20px;
            padding: 8px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        /* 結果表示エリア */
        .result-pane {
            flex: 1;
            border: 1px solid #bbb;
            padding: 15px;
            min-height: 250px;
            white-space: pre-wrap; /* 改行を保持 */
            word-wrap: break-word;
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 14px;
            line-height: 1.5;
            background-color: #fafafa;
            overflow-x: auto;
        }
        /* ハイライト色（本家準拠） */
        .del {
            background-color: #cceeff; /* 左側：削除部分（水色） */
            text-decoration: line-through;
        }
        .ins {
            background-color: #ccffcc; /* 右側：追加部分（薄緑） */
            font-weight: bold;
        }
        .char-count {
            font-size: 12px;
            color: #888;
            font-weight: normal;
        }

        /* ----- ナビゲーションバー（ミニマップ） ----- */
        .minimap {
            position: fixed;
            top: 0;
            right: 0;
            width: 40px;           /* 広がらないように固定幅に変更 */
            height: 100vh;         /* 画面全体の高さ */
            background-color: rgba(240, 240, 240, 0.7);
            border-left: 1px solid #ccc;
            z-index: 1000;
            cursor: pointer;
            box-shadow: -2px 0 5px rgba(0,0,0,0.05);
        }
        /* 広がるアニメーション(.minimap:hover)を削除しました */

        .minimap-marker {
            position: absolute;
            left: 0;
            width: 100%;
            min-height: 3px;       /* どんなに小さくても3pxは確保 */
            opacity: 0.8;
        }
        .minimap-marker:hover {
            opacity: 1;
        }
        /* マーカーの色 */
        .minimap-marker.del-marker {
            background-color: #4da6ff; /* 水色（削除） */
        }
        .minimap-marker.ins-marker {
            background-color: #33cc33; /* 緑（追加） */
        }
    </style>
</head>
<body>

    <div class="flex-container">
        <div class="pane">
            <div class="pane-header">
                <span>元のテキスト (変更前)</span>
                <span id="old-count" class="char-count"></span>
            </div>
            <textarea id="text-old" placeholder="ここに元のテキストを入力..."></textarea>
        </div>
        <div class="pane">
            <div class="pane-header">
                <span>新しいテキスト (変更後)</span>
                <span id="new-count" class="char-count"></span>
            </div>
            <textarea id="text-new" placeholder="ここに新しいテキストを入力..."></textarea>
        </div>
    </div>

    <div class="controls">
        <b>比較モード:</b>
        <label><input type="radio" name="mode" value="char" checked> 文字単位</label>
        <label><input type="radio" name="mode" value="word"> 単語単位</label>
        <label><input type="radio" name="mode" value="line"> 行単位</label>
        
        <button onclick="compareText()">比較する</button>
    </div>

    <div class="flex-container" id="result-container" style="display: none;">
        <div class="pane">
            <div class="pane-header">変更前（削除された部分）</div>
            <div id="result-old" class="result-pane"></div>
        </div>
        <div class="pane">
            <div class="pane-header">変更後（追加された部分）</div>
            <div id="result-new" class="result-pane"></div>
        </div>
    </div>

    <div id="minimap" class="minimap" style="display: none;"></div>

    <script>
        function compareText() {
            const textOld = document.getElementById('text-old').value;
            const textNew = document.getElementById('text-new').value;
            const mode = document.querySelector('input[name="mode"]:checked').value;

            // 文字数を表示
            document.getElementById('old-count').innerText = `${textOld.length}文字`;
            document.getElementById('new-count').innerText = `${textNew.length}文字`;

            // モードに応じてDiffの関数を切り替え
            let diff;
            if (mode === 'char') {
                diff = Diff.diffChars(textOld, textNew);
            } else if (mode === 'word') {
                diff = Diff.diffWords(textOld, textNew);
            } else if (mode === 'line') {
                diff = Diff.diffLines(textOld, textNew);
            }

            let htmlOld = '';
            let htmlNew = '';

            // 差分データを解析して左右それぞれのHTMLを生成
            diff.forEach((part) => {
                const escapedValue = part.value
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");

                if (part.added) {
                    htmlNew += `<span class="ins">${escapedValue}</span>`;
                } else if (part.removed) {
                    htmlOld += `<span class="del">${escapedValue}</span>`;
                } else {
                    htmlOld += escapedValue;
                    htmlNew += escapedValue;
                }
            });

            // 結果を出力
            document.getElementById('result-old').innerHTML = htmlOld;
            document.getElementById('result-new').innerHTML = htmlNew;
            document.getElementById('result-container').style.display = 'flex';
            document.getElementById('minimap').style.display = 'block';

            // レンダリング完了後にミニマップを更新
            setTimeout(drawMinimap, 100);
        }

        function drawMinimap() {
            const minimap = document.getElementById('minimap');
            minimap.innerHTML = ''; // 既存のマーカーをクリア

            // ページ全体の高さ（スクロール領域含む）
            const pageHeight = document.documentElement.scrollHeight;
            
            // マーカーを生成するヘルパー関数
            const createMarkers = (selector, markerClass) => {
                document.querySelectorAll(selector).forEach(el => {
                    const rect = el.getBoundingClientRect();
                    // 要素の絶対的なY座標
                    const absoluteTop = rect.top + window.scrollY;
                    
                    // ページ全体に対する位置と高さの割合（％）を計算
                    const topPercent = (absoluteTop / pageHeight) * 100;
                    const heightPercent = (rect.height / pageHeight) * 100;

                    const marker = document.createElement('div');
                    marker.className = `minimap-marker ${markerClass}`;
                    marker.style.top = `${topPercent}%`;
                    marker.style.height = `${Math.max(heightPercent, 0.2)}%`; // 最低限の太さを確保

                    // マーカーをクリックしたらその位置までスムーズスクロール
                    marker.onclick = (e) => {
                        e.stopPropagation(); // minimap自体のクリックイベント発火を防ぐ
                        window.scrollTo({ 
                            top: absoluteTop - 100, // 上部に少し余白(100px)を持たせてスクロール
                            behavior: 'smooth' 
                        });
                    };

                    minimap.appendChild(marker);
                });
            };

            // 削除部分(左)と追加部分(右)のマーカーを作成
            createMarkers('#result-old .del', 'del-marker');
            createMarkers('#result-new .ins', 'ins-marker');

            // ミニマップの空白部分をクリックした時も、その位置の割合に応じてスクロールする
            minimap.onclick = (e) => {
                const clickY = e.clientY;
                const windowHeight = window.innerHeight;
                const scrollTarget = (clickY / windowHeight) * pageHeight;
                window.scrollTo({
                    top: scrollTarget - (windowHeight / 2), // クリックした位置が画面中央に来るように
                    behavior: 'smooth'
                });
            };
        }

        // ウィンドウサイズが変わると要素の位置がズレるため、リサイズ時にミニマップを再描画
        window.addEventListener('resize', () => {
            if (document.getElementById('result-container').style.display !== 'none') {
                drawMinimap();
            }
        });
    </script>
</body>
</html>
