<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキスト比較ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            padding-right: 40px; 
            background-color: #ffffff;
            color: #333;
        }
        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .flex-container {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-bottom: 15px;
        }
        .pane {
            flex: 1;
            width: 50%;
            display: flex;
            flex-direction: column;
        }
        .pane-header {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-bottom: none;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            resize: vertical;
            font-family: monospace;
        }
        .controls {
            text-align: center;
            background-color: #f0f0f0;
            padding: 15px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .controls label {
            margin: 0 10px;
            font-size: 15px;
            cursor: pointer;
        }
        button {
            margin-left: 20px;
            padding: 8px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .result-pane {
            flex: 1;
            border: 1px solid #bbb;
            padding: 15px;
            min-height: 250px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 14px;
            line-height: 1.5;
            background-color: #fafafa;
            overflow-x: auto;
        }
        .del {
            background-color: #cceeff;
            text-decoration: line-through;
        }
        .ins {
            background-color: #ccffcc;
            font-weight: bold;
        }
        .char-count {
            font-size: 12px;
            color: #888;
            font-weight: normal;
        }
        .minimap {
            position: fixed;
            top: 0;
            right: 0;
            width: 40px;
            height: 100vh;
            background-color: rgba(240, 240, 240, 0.7);
            border-left: 1px solid #ccc;
            z-index: 1000;
            cursor: pointer;
            box-shadow: -2px 0 5px rgba(0,0,0,0.05);
        }
        .minimap-marker {
            position: absolute;
            left: 0;
            width: 100%;
            min-height: 3px;
            opacity: 0.8;
        }
        .minimap-marker:hover {
            opacity: 1;
        }
        .minimap-marker.del-marker {
            background-color: #4da6ff;
        }
        .minimap-marker.ins-marker {
            background-color: #33cc33;
        }
    </style>
</head>
<body>

    <div class="flex-container">
        <div class="pane">
            <div class="pane-header">
                <span>元のテキスト (変更前)</span>
                <span id="old-count" class="char-count"></span>
            </div>
            <textarea id="text-old" placeholder="ここに元のテキストを入力..."></textarea>
        </div>
        <div class="pane">
            <div class="pane-header">
                <span>新しいテキスト (変更後)</span>
                <span id="new-count" class="char-count"></span>
            </div>
            <textarea id="text-new" placeholder="ここに新しいテキストを入力..."></textarea>
        </div>
    </div>

    <div class="controls">
        <b>比較モード:</b>
        <label><input type="radio" name="mode" value="char" checked> 文字単位</label>
        <label><input type="radio" name="mode" value="word"> 単語単位</label>
        <label><input type="radio" name="mode" value="line"> 行単位</label>
        
        <button onclick="compareText()">比較する</button>
    </div>

    <div class="flex-container" id="result-container" style="display: none;">
        <div class="pane">
            <div class="pane-header">変更前（削除された部分）</div>
            <div id="result-old" class="result-pane"></div>
        </div>
        <div class="pane">
            <div class="pane-header">変更後（追加された部分）</div>
            <div id="result-new" class="result-pane"></div>
        </div>
    </div>

    <div id="minimap" class="minimap" style="display: none;"></div>

    <script>
        function compareText() {
            const textOld = document.getElementById('text-old').value;
            const textNew = document.getElementById('text-new').value;
            const mode = document.querySelector('input[name="mode"]:checked').value;

            document.getElementById('old-count').innerText = `${textOld.length}文字`;
            document.getElementById('new-count').innerText = `${textNew.length}文字`;

            const escapeHtml = (str) => {
                return str.replace(/&/g, "&amp;")
                          .replace(/</g, "&lt;")
                          .replace(/>/g, "&gt;");
            };

            // 1. まず「行単位」で差分を取り、全体のレイアウト（高さ）を揃えるベースを作る
            const lineDiff = Diff.diffLines(textOld, textNew);

            let blocks = [];
            let currentBlock = { old: '', new: '' };

            // 変更行をブロックとしてグループ化
            lineDiff.forEach((part) => {
                if (part.added) {
                    currentBlock.new += part.value;
                } else if (part.removed) {
                    currentBlock.old += part.value;
                } else {
                    if (currentBlock.old || currentBlock.new) {
                        blocks.push(currentBlock);
                        currentBlock = { old: '', new: '' };
                    }
                    blocks.push({ common: part.value });
                }
            });
            if (currentBlock.old || currentBlock.new) {
                blocks.push(currentBlock);
            }

            let htmlOld = '';
            let htmlNew = '';

            // 2. ブロックごとにHTMLを生成し、必要に応じて行内で文字・単語Diffを実行
            blocks.forEach(block => {
                if (block.common !== undefined) {
                    // 変更がない共通部分はそのまま出力
                    const escaped = escapeHtml(block.common);
                    htmlOld += escaped;
                    htmlNew += escaped;
                } else {
                    // 変更があったブロック（左と右で行数が異なる可能性がある部分）
                    let oldText = block.old;
                    let newText = block.new;

                    // 行数をカウントして足りない分を計算
                    const oldLines = (oldText.match(/\n/g) || []).length;
                    const newLines = (newText.match(/\n/g) || []).length;
                    const paddingLines = Math.abs(oldLines - newLines);
                    const padding = '\n'.repeat(paddingLines);

                    let oldHtmlChunk = '';
                    let newHtmlChunk = '';

                    // 文字・単語モードなら、このブロックの内部だけで詳細なDiffを行う
                    if (mode === 'char' || mode === 'word') {
                        let subDiff = mode === 'char' 
                            ? Diff.diffChars(oldText, newText) 
                            : Diff.diffWords(oldText, newText);

                        subDiff.forEach(subPart => {
                            const escaped = escapeHtml(subPart.value);
                            if (subPart.added) {
                                newHtmlChunk += `<span class="ins">${escaped}</span>`;
                            } else if (subPart.removed) {
                                oldHtmlChunk += `<span class="del">${escaped}</span>`;
                            } else {
                                oldHtmlChunk += escaped;
                                newHtmlChunk += escaped;
                            }
                        });
                    } else {
                        // 行モードの場合はブロック全体をハイライト
                        if (oldText) oldHtmlChunk = `<span class="del">${escapeHtml(oldText)}</span>`;
                        if (newText) newHtmlChunk = `<span class="ins">${escapeHtml(newText)}</span>`;
                    }

                    // ブロックの「最後に」不足分の改行を追加して高さを合わせる（途中で改行させない）
                    htmlOld += oldHtmlChunk + (oldLines < newLines ? padding : '');
                    htmlNew += newHtmlChunk + (newLines < oldLines ? padding : '');
                }
            });

            document.getElementById('result-old').innerHTML = htmlOld;
            document.getElementById('result-new').innerHTML = htmlNew;
            document.getElementById('result-container').style.display = 'flex';
            document.getElementById('minimap').style.display = 'block';

            setTimeout(drawMinimap, 100);
        }

        function drawMinimap() {
            const minimap = document.getElementById('minimap');
            minimap.innerHTML = '';

            const pageHeight = document.documentElement.scrollHeight;
            
            const createMarkers = (selector, markerClass) => {
                document.querySelectorAll(selector).forEach(el => {
                    const rect = el.getBoundingClientRect();
                    const absoluteTop = rect.top + window.scrollY;
                    const topPercent = (absoluteTop / pageHeight) * 100;
                    const heightPercent = (rect.height / pageHeight) * 100;

                    const marker = document.createElement('div');
                    marker.className = `minimap-marker ${markerClass}`;
                    marker.style.top = `${topPercent}%`;
                    marker.style.height = `${Math.max(heightPercent, 0.2)}%`;

                    marker.onclick = (e) => {
                        e.stopPropagation();
                        window.scrollTo({ 
                            top: absoluteTop - 100, 
                            behavior: 'smooth' 
                        });
                    };
                    minimap.appendChild(marker);
                });
            };

            createMarkers('#result-old .del', 'del-marker');
            createMarkers('#result-new .ins', 'ins-marker');

            minimap.onclick = (e) => {
                const clickY = e.clientY;
                const windowHeight = window.innerHeight;
                const scrollTarget = (clickY / windowHeight) * pageHeight;
                window.scrollTo({
                    top: scrollTarget - (windowHeight / 2),
                    behavior: 'smooth'
                });
            };
        }

        window.addEventListener('resize', () => {
            if (document.getElementById('result-container').style.display !== 'none') {
                drawMinimap();
            }
        });
    </script>
</body>
</html>
