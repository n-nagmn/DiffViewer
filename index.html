<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキスト比較ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            padding-right: 40px; 
            background-color: #ffffff;
            color: #333;
        }
        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 5px;
        }
        .flex-container {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-bottom: 15px;
        }
        .pane {
            flex: 1;
            width: 50%;
            display: flex;
            flex-direction: column;
        }
        .pane-header {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-bottom: none;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            resize: vertical;
            font-family: monospace;
        }
        .controls {
            text-align: center;
            background-color: #f0f0f0;
            padding: 15px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .controls label {
            margin: 0 10px;
            font-size: 15px;
            cursor: pointer;
        }
        button {
            margin-left: 20px;
            padding: 8px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .char-count {
            font-size: 12px;
            color: #888;
            font-weight: normal;
        }
        
        /* ミニマップ */
        .minimap {
            position: fixed;
            top: 0;
            right: 0;
            width: 40px;
            height: 100vh;
            background-color: rgba(240, 240, 240, 0.7);
            border-left: 1px solid #ccc;
            z-index: 1000;
            cursor: pointer;
            box-shadow: -2px 0 5px rgba(0,0,0,0.05);
        }
        .minimap-marker {
            position: absolute;
            left: 0;
            width: 100%;
            min-height: 3px;
            opacity: 0.8;
        }
        .minimap-marker:hover {
            opacity: 1;
        }
        .minimap-marker.del-marker {
            background-color: #4da6ff;
        }
        .minimap-marker.ins-marker {
            background-color: #33cc33;
        }

        /* 差分ハイライト */
        .del {
            background-color: #cceeff;
            text-decoration: line-through;
        }
        .ins {
            background-color: #ccffcc;
            font-weight: bold;
        }

        /* 新しい結果表示エリア（行同期対応） */
        .result-pane {
            flex: 1;
            border: 1px solid #bbb;
            min-height: 250px;
            background-color: #fafafa;
            overflow-x: auto;
            tab-size: 4;
        }
        .diff-row {
            display: flex;
            width: 100%;
            border-bottom: 1px dashed #ddd; /* 左右の高さを同期するための行区切り */
        }
        .diff-row:last-child {
            border-bottom: none;
        }
        .diff-cell {
            flex: 1;
            width: 50%;
            padding: 2px 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-sizing: border-box;
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        .diff-cell.left-cell {
            border-right: 1px solid #bbb;
        }
        .newline-symbol {
            color: #aaa;
            font-size: 0.9em;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="flex-container">
        <div class="pane">
            <div class="pane-header">
                <span>元のテキスト (変更前)</span>
                <span id="old-count" class="char-count"></span>
            </div>
            <textarea id="text-old" placeholder="ここに元のテキストを入力..."></textarea>
        </div>
        <div class="pane">
            <div class="pane-header">
                <span>新しいテキスト (変更後)</span>
                <span id="new-count" class="char-count"></span>
            </div>
            <textarea id="text-new" placeholder="ここに新しいテキストを入力..."></textarea>
        </div>
    </div>

    <div class="controls">
        <b>比較モード:</b>
        <label><input type="radio" name="mode" value="char" checked> 文字単位</label>
        <label><input type="radio" name="mode" value="word"> 単語単位</label>
        <label><input type="radio" name="mode" value="line"> 行単位</label>
        <button onclick="swapTexts()">左右を入れ替える</button>
        <button onclick="compareText()">比較する</button>
    </div>

    <div id="result-container" style="display: none; flex-direction: column; margin-bottom: 20px;">
        <div class="flex-container" style="margin-bottom: 0;">
            <div class="pane" style="border: none; background: transparent; padding-bottom: 0;">
                <div class="pane-header">変更前（削除された部分）</div>
            </div>
            <div class="pane" style="border: none; background: transparent; padding-bottom: 0;">
                <div class="pane-header">変更後（追加された部分）</div>
            </div>
        </div>
        <div id="unified-result" class="result-pane" style="display: flex; flex-direction: column; padding: 0;">
            </div>
    </div>

    <div id="minimap" class="minimap" style="display: none;"></div>

    <script>
        function compareText() {
            // 改行コードの違いを \n に統一
            const textOld = document.getElementById('text-old').value.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const textNew = document.getElementById('text-new').value.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const mode = document.querySelector('input[name="mode"]:checked').value;

            document.getElementById('old-count').innerText = `${textOld.length}文字`;
            document.getElementById('new-count').innerText = `${textNew.length}文字`;

            const escapeHtml = (str) => {
                return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            };

            // 【1】difff純正のトークン化アルゴリズム
            const tokenize = (text, mode) => {
                if (mode === 'line') {
                    const result = [];
                    let current = '';
                    for (let i = 0; i < text.length; i++) {
                        current += text[i];
                        if (text[i] === '\n') {
                            result.push(current);
                            current = '';
                        }
                    }
                    if (current !== '') result.push(current);
                    return result;
                } else if (mode === 'char') {
                    return text.split('');
                } else {
                    const tokens = [];
                    const regex = /([a-zA-Z0-9]+|\n|[^a-zA-Z0-9\n])/g;
                    let match;
                    while ((match = regex.exec(text)) !== null) {
                        tokens.push(match[0]);
                    }
                    return tokens;
                }
            };

            const oldTokens = tokenize(textOld, mode);
            const newTokens = tokenize(textNew, mode);

            // 【2】jsdiffを使ってトークン同士を比較
            const diffResult = Diff.diffArrays(oldTokens, newTokens);

            // 【3】改行を検知して左右の行を同期させる
            let leftRows = [];
            let rightRows = [];
            let currentLeft = '';
            let currentRight = '';

            diffResult.forEach(part => {
                part.value.forEach(token => {
                    const subTokens = token.split(/(\n)/); 

                    subTokens.forEach(subToken => {
                        if (subToken === '\n') {
                            if (part.added) {
                                rightRows.push(currentRight); currentRight = '';
                                leftRows.push(currentLeft);   currentLeft = '';
                            } else if (part.removed) {
                                leftRows.push(currentLeft);   currentLeft = '';
                                rightRows.push(currentRight); currentRight = '';
                            } else {
                                leftRows.push(currentLeft);   currentLeft = '';
                                rightRows.push(currentRight); currentRight = '';
                            }
                        } else if (subToken !== '') {
                            const escaped = escapeHtml(subToken);
                            let html = '';
                            
                            if (part.added) {
                                html = `<span class="ins">${escaped}</span>`;
                                currentRight += html;
                            } else if (part.removed) {
                                html = `<span class="del">${escaped}</span>`;
                                currentLeft += html;
                            } else {
                                html = escaped;
                                currentLeft += html;
                                currentRight += html;
                            }
                        }
                    });
                });
            });

            leftRows.push(currentLeft);
            rightRows.push(currentRight);

            // 【4】HTMLの行ブロックとして出力
            const resultContainer = document.getElementById('unified-result');
            resultContainer.innerHTML = ''; 

            for (let i = 0; i < leftRows.length; i++) {
                const row = document.createElement('div');
                row.className = 'diff-row';

                const leftCell = document.createElement('div');
                leftCell.className = 'diff-cell left-cell';
                leftCell.innerHTML = leftRows[i] === '' ? '<span style="visibility:hidden;">&nbsp;</span>' : leftRows[i];

                const rightCell = document.createElement('div');
                rightCell.className = 'diff-cell right-cell';
                rightCell.innerHTML = rightRows[i] === '' ? '<span style="visibility:hidden;">&nbsp;</span>' : rightRows[i];

                row.appendChild(leftCell);
                row.appendChild(rightCell);
                resultContainer.appendChild(row);
            }

            document.getElementById('result-container').style.display = 'flex';
            document.getElementById('minimap').style.display = 'block';

            setTimeout(drawMinimap, 100);
        }

        function drawMinimap() {
            const minimap = document.getElementById('minimap');
            minimap.innerHTML = '';

            const pageHeight = document.documentElement.scrollHeight;
            
            const createMarkers = (selector, markerClass) => {
                document.querySelectorAll(selector).forEach(el => {
                    const rect = el.getBoundingClientRect();
                    const absoluteTop = rect.top + window.scrollY;
                    const topPercent = (absoluteTop / pageHeight) * 100;
                    const heightPercent = (rect.height / pageHeight) * 100;

                    const marker = document.createElement('div');
                    marker.className = `minimap-marker ${markerClass}`;
                    marker.style.top = `${topPercent}%`;
                    marker.style.height = `${Math.max(heightPercent, 0.2)}%`;

                    marker.onclick = (e) => {
                        e.stopPropagation();
                        window.scrollTo({ 
                            top: absoluteTop - 100, 
                            behavior: 'smooth' 
                        });
                    };
                    minimap.appendChild(marker);
                });
            };

            // セレクタを新しい構造（.diff-cell）に対応
            createMarkers('.left-cell .del', 'del-marker');
            createMarkers('.right-cell .ins', 'ins-marker');

            minimap.onclick = (e) => {
                const clickY = e.clientY;
                const windowHeight = window.innerHeight;
                const scrollTarget = (clickY / windowHeight) * pageHeight;
                window.scrollTo({
                    top: scrollTarget - (windowHeight / 2),
                    behavior: 'smooth'
                });
            };
        }

        window.addEventListener('resize', () => {
            if (document.getElementById('result-container').style.display !== 'none') {
                drawMinimap();
            }
        });

        function swapTexts() {
            const oldInput = document.getElementById('text-old');
            const newInput = document.getElementById('text-new');
            
            const temp = oldInput.value;
            oldInput.value = newInput.value;
            newInput.value = temp;
            
            if (document.getElementById('result-container').style.display !== 'none') {
                compareText();
            }
        }
    </script>
</body>
</html>
